name: Deploy to Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prepare standalone deployment bundle
        run: |
          rm -rf deploy
          mkdir -p deploy/.next/static
          cp -R .next/standalone/. deploy/
          cp -R .next/static/. deploy/.next/static/
          cp -R public deploy/public

      - name: Configure SSH
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_SSH_PASSPHRASE: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
        run: |
          test -n "$CPANEL_HOST" || (echo "Missing CPANEL_HOST secret" && exit 1)
          test -n "$CPANEL_PORT" || (echo "Missing CPANEL_PORT secret" && exit 1)
          test -n "$CPANEL_SSH_KEY" || (echo "Missing CPANEL_SSH_KEY secret" && exit 1)
          test -n "$CPANEL_SSH_PASSPHRASE" || (echo "Missing CPANEL_SSH_PASSPHRASE secret" && exit 1)

          mkdir -p ~/.ssh
          printf '%s\n' "$CPANEL_SSH_KEY" > ~/.ssh/namecheap_deploy_key
          chmod 600 ~/.ssh/namecheap_deploy_key

          printf '%s\n' '#!/usr/bin/env bash' 'printf "%s\n" "$CPANEL_SSH_PASSPHRASE"' > ~/.ssh/askpass.sh
          chmod 700 ~/.ssh/askpass.sh

          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/askpass.sh SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/namecheap_deploy_key < /dev/null

          ssh-keyscan -p "$CPANEL_PORT" "$CPANEL_HOST" >> ~/.ssh/known_hosts

      - name: Upload files to Namecheap
        run: |
          rsync -az --delete \
            --exclude=".env" \
            --exclude="tmp/" \
            --exclude="nodevenv/" \
            --exclude=".well-known/" \
            --exclude=".htaccess" \
            -e "ssh -p ${{ secrets.CPANEL_PORT }}" \
            deploy/ "${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}:${{ secrets.CPANEL_APP_PATH }}/"

      - name: Restart cPanel Node.js app
        run: |
          ssh -p "${{ secrets.CPANEL_PORT }}" \
            "${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}" \
            "mkdir -p '${{ secrets.CPANEL_APP_PATH }}/tmp' && touch '${{ secrets.CPANEL_APP_PATH }}/tmp/restart.txt'"
