name: Deploy to Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prepare standalone deployment bundle
        run: |
          rm -rf deploy
          mkdir -p deploy/.next/static
          cp -R .next/standalone/. deploy/
          cp -R .next/static/. deploy/.next/static/
          cp -R public deploy/public
          rm -f deploy/.env
          tar -czf deploy.tar.gz -C deploy .

      - name: Configure SSH
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_SSH_PASSPHRASE: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          test -n "$CPANEL_HOST" || (echo "Missing CPANEL_HOST secret" && exit 1)
          test -n "$CPANEL_PORT" || (echo "Missing CPANEL_PORT secret" && exit 1)
          test -n "$CPANEL_SSH_KEY" || (echo "Missing CPANEL_SSH_KEY secret" && exit 1)
          test -n "$CPANEL_SSH_PASSPHRASE" || (echo "Missing CPANEL_SSH_PASSPHRASE secret" && exit 1)

          mkdir -p ~/.ssh
          printf '%s\n' "$CPANEL_SSH_KEY" > ~/.ssh/namecheap_deploy_key
          chmod 600 ~/.ssh/namecheap_deploy_key

          if ! grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/namecheap_deploy_key; then
            echo "CPANEL_SSH_KEY does not look like a private key. Copy the private key, not the .pub public key."
            exit 1
          fi

          echo "Checking SSH private key and passphrase..."
          ssh-keygen -y -P "$CPANEL_SSH_PASSPHRASE" -f ~/.ssh/namecheap_deploy_key > /dev/null

          printf '%s\n' '#!/usr/bin/env bash' 'printf "%s\n" "$CPANEL_SSH_PASSPHRASE"' > ~/.ssh/askpass.sh
          chmod 700 ~/.ssh/askpass.sh

          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          DISPLAY=:0 SSH_ASKPASS="$HOME/.ssh/askpass.sh" SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/namecheap_deploy_key < /dev/null

          echo "Adding Namecheap host key..."
          ssh-keyscan -p "$CPANEL_PORT" "$CPANEL_HOST" >> ~/.ssh/known_hosts

      - name: Upload files to Namecheap
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_APP_PATH: ${{ secrets.CPANEL_APP_PATH }}
        run: |
          set -euo pipefail

          ssh -p "$CPANEL_PORT" -T -o BatchMode=yes -o LogLevel=ERROR \
            "$CPANEL_USERNAME@$CPANEL_HOST" \
            "mkdir -p '$CPANEL_APP_PATH'"

          scp -P "$CPANEL_PORT" -o BatchMode=yes -o LogLevel=ERROR \
            deploy.tar.gz "$CPANEL_USERNAME@$CPANEL_HOST:$CPANEL_APP_PATH/deploy.tar.gz"

          ssh -p "$CPANEL_PORT" -T -o BatchMode=yes -o LogLevel=ERROR \
            "$CPANEL_USERNAME@$CPANEL_HOST" \
            "cd '$CPANEL_APP_PATH' && tar -xzf deploy.tar.gz && rm -f deploy.tar.gz"

      - name: Restart cPanel Node.js app
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_APP_PATH: ${{ secrets.CPANEL_APP_PATH }}
        run: |
          ssh -p "$CPANEL_PORT" -T -o BatchMode=yes -o LogLevel=ERROR \
            "$CPANEL_USERNAME@$CPANEL_HOST" \
            "mkdir -p '$CPANEL_APP_PATH/tmp' && touch '$CPANEL_APP_PATH/tmp/restart.txt'"
